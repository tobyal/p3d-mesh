exp:
  data_name: airplane
  exp_name: predict
  out_dir: output

train:
  max_steps: 6000
  save_freq: 6000
  report_freq: 500
  val_freq: 2000
  
  batch_size: 5000
  learning_rate: 0.001
  warm_up_end: 1000
  loss_weight: [1.0, 0.1, 0.001, 0.0]
  accelerator: gpu
  devices: 1
  seed: 123456

data:
  data_dir: output/airplane/predict/ply/pspnet
  data_name: airplane_4


  data_type: object
  queries_size: 1_000_000
  pull_knn: 1
  surface_queries: 
  project_sdf_level:
  noisy_pts:

model:
  sdf_network:
    d_in: 3
    d_out: 1
    d_hidden: 256
    n_layers: 8
    skip_in: [4]
    multires: 8
    geometric_init: true
    weight_norm: true
    inside_outside: false


paths:
  ckpt: ""
  recording: []